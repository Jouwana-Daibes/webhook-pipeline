name: Webhook Pipeline Test

on:
  push:
    branches: [main]

jobs:
  test-webhooks:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐳 Start system (API + Worker + DB + Redis)
        run: docker compose up -d --build

      - name: ⏳ Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/health; then
              echo "API is ready ✅"
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "API failed to start ❌"
          docker compose logs
          exit 1

      - name: 🧪 Full system test
        run: |
          echo "🚀 Creating pipelines..."

          curl -s -X POST http://localhost:3000/pipelines \
            -H "Content-Type: application/json" \
            -d '{"name":"Uppercase","source_url":"s1","action_type":"uppercase_field"}'

          curl -s -X POST http://localhost:3000/pipelines \
            -H "Content-Type: application/json" \
            -d '{"name":"Duplicate","source_url":"s2","action_type":"duplicate_detector"}'

          curl -s -X POST http://localhost:3000/pipelines \
            -H "Content-Type: application/json" \
            -d '{"name":"Sentiment","source_url":"s3","action_type":"sentiment_analysis"}'

          echo "👥 Adding subscribers..."

          for i in 1 2 3; do
            curl -s -X POST http://localhost:3000/subscribers \
              -H "Content-Type: application/json" \
              -d "{\"pipeline_id\":$i,\"target_url\":\"http://api:3000/test-receiver\"}"
          done

          echo "📩 Sending webhooks..."

          curl -s -X POST http://localhost:3000/webhooks/1 \
            -H "Content-Type: application/json" \
            -d '{"message":"hello"}'

          curl -s -X POST http://localhost:3000/webhooks/2 \
            -H "Content-Type: application/json" \
            -d '{"message":"same"}'

          curl -s -X POST http://localhost:3000/webhooks/2 \
            -H "Content-Type: application/json" \
            -d '{"message":"same"}'

          curl -s -X POST http://localhost:3000/webhooks/3 \
            -H "Content-Type: application/json" \
            -d '{"message":"this is amazing and perfect"}'

          echo "⏳ Waiting for processing..."
          sleep 12

          echo "📊 Fetching jobs..."

          JOB1=$(curl -s http://localhost:3000/jobs/pipeline/1 | jq 'sort_by(.id) | last')
          JOB2=$(curl -s http://localhost:3000/jobs/pipeline/2 | jq 'sort_by(.id) | last')
          JOB3=$(curl -s http://localhost:3000/jobs/pipeline/3 | jq 'sort_by(.id) | last')

          MSG_UPPER=$(echo $JOB1 | jq -r '.result.message')
          DUP_FLAG=$(echo $JOB2 | jq -r '.result.is_duplicate')
          SENTIMENT=$(echo $JOB3 | jq -r '.result.sentiment')

          echo "Uppercase: $MSG_UPPER"
          echo "Duplicate: $DUP_FLAG"
          echo "Sentiment: $SENTIMENT"

          if [ "$MSG_UPPER" != "HELLO" ]; then exit 1; fi
          if [ "$DUP_FLAG" != "true" ]; then exit 1; fi
          if [ "$SENTIMENT" != "positive" ]; then exit 1; fi

          echo "✅ Logic tests passed"

          echo "🧪 Testing delivery attempts..."

          curl -s -X POST http://localhost:3000/webhooks/1 \
            -H "Content-Type: application/json" \
            -d '{"message":"hello from CI"}'

          sleep 20

          JOB_ID=$(curl -s http://localhost:3000/jobs/pipeline/1 | jq 'sort_by(.id) | last | .id')
         

          SUBSCRIBERS=$(curl -s http://localhost:3000/subscribers/pipeline/1)
          ATTEMPTS=$(curl -s http://localhost:3000/delivery-attempts/job/$JOB_ID)

          FAILED=0

          for SUB_ID in $(echo $SUBSCRIBERS | jq -r '.[].id'); do
            SUCCESS=$(echo $ATTEMPTS | jq "[.[] | select(.subscriber_id == $SUB_ID and .success == true)] | length")

            if [ "$SUCCESS" -eq 0 ]; then
              echo "❌ Subscriber $SUB_ID failed"
              FAILED=1
            else
              echo "✅ Subscriber $SUB_ID success"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Delivery test failed"
            exit 1
          fi

          echo "🎉 ALL TESTS PASSED"
